<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <!-- Random Space Fact Section -->
    <section class="random-fact-section">
      <h2>Random Space Fact</h2>
      <p id="randomFact">Loading a cosmic fact...</p>
    </section>

    <!-- Filters -->
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="searchBtn">Get Space Images</button>
    </div>

    <!-- Loading Message -->
    <div id="loading" class="loading-message">
      Loading cosmic wonders... ✨
    </div>

    <!-- Gallery -->
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modalMediaContainer" class="modal-media-container">
        <!-- Image or video will be inserted here -->
      </div>
      <div class="modal-info">
        <h2 id="modalTitle">Title</h2>
        <p id="modalDate" class="modal-date">Date</p>
        <p id="modalExplanation" class="modal-explanation">Explanation</p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
